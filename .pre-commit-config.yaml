default_install_hook_types: [pre-commit, commit-msg, post-checkout, post-merge]
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
        exclude: ^(.vscode/.*.json|frontend/tsconfig.json)
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/python-poetry/poetry
    # https://python-poetry.org/docs/main/pre-commit-hooks/#why-does-pre-commit-autoupdate-not-update-to-the-latest-version
    rev: 2.3.2
    hooks:
      - id: poetry-check
        args: [-C, ./backend]
      - id: poetry-lock
        args: [-C, ./backend]
      - id: poetry-install
        args: [-C, ./backend]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.8.1
          # https://github.com/sveltejs/prettier-plugin-svelte/issues/155#issuecomment-1932256171
          - prettier-plugin-svelte@3.4.1
          # https://github.com/tailwindlabs/prettier-plugin-tailwindcss/issues/228#issuecomment-1920361470
          - prettier-plugin-tailwindcss@0.7.2
        args: [--config, ./frontend/.prettierrc, --ignore-path, ./frontend/.prettierignore, --write, ./frontend]
